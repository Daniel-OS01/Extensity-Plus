name: "claude: URL Rules"

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  url-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run existing URL rules unit tests
        id: test-existing
        run: |
          set -o pipefail
          node --test --test-name-pattern="url rules" tests/browser-modules.test.js 2>&1 | tee url-test-existing.txt
        continue-on-error: true

      - name: Run URL rules edge-case tests
        id: test-edge
        run: |
          set -o pipefail
          node --test tests/url-rules-edge-cases.test.js 2>&1 | tee url-test-edge.txt
        continue-on-error: true

      - name: PR Safety Summary
        if: always()
        run: |
          EXISTING="${{ steps.test-existing.outcome }}"
          EDGE="${{ steps.test-edge.outcome }}"

          echo ""
          echo "=========================================="
          if [ "$EXISTING" = "success" ] && [ "$EDGE" = "success" ]; then
            echo "✅  PR SAFE TO COMMIT"
            echo "    URL rules: all assertions passed."
            echo ""
            echo "    Verified:"
            echo "    • isSupportedUrl correctly accepts http/https and rejects all other schemes"
            echo "    • matchUrl wildcard patterns resolve correctly"
            echo "    • matchUrl regex: malformed patterns return false, not throw"
            echo "    • resolveChanges: inactive rules are skipped"
            echo "    • resolveChanges: later rule wins on conflict (last-rule-wins precedence)"
            echo "    • resolveChanges returns empty object for non-http/https URLs"
            echo "    • normalizeRule defaults: wildcard method, 'Untitled Rule' name, active:true"
          else
            echo "❌  PR NOT SAFE TO COMMIT"
            echo "    URL rules checks failed."
            echo ""
            if [ "$EXISTING" != "success" ]; then
              echo "=== Existing test failures ==="
              cat url-test-existing.txt || true
              echo ""
            fi
            if [ "$EDGE" != "success" ]; then
              echo "=== Edge-case test failures ==="
              cat url-test-edge.txt || true
              echo ""
            fi
            echo "=== Suggested fixes ==="
            echo ""
            echo "  isSupportedUrl accepts a restricted scheme:"
            echo "    → Only 'http:' and 'https:' should pass the protocol check in js/url-rules.js"
            echo "    → Verify the condition: parsed.protocol === 'http:' || parsed.protocol === 'https:'"
            echo ""
            echo "  matchUrl throws on malformed regex:"
            echo "    → The try/catch around new RegExp(pattern) in matchUrl must catch and return false"
            echo ""
            echo "  resolveChanges does not skip inactive rules:"
            echo "    → The if (!rule.active ...) guard must be present before processing enableIds/disableIds"
            echo ""
            echo "  resolveChanges rule precedence is wrong:"
            echo "    → Rules are processed in array order; later rules must overwrite earlier ones"
            echo "    → Check that forEach over normalizeRules(rules) applies writes unconditionally"
            echo ""
            echo "  normalizeRule sets wrong default matchMethod:"
            echo "    → Only 'regex' should pass through; everything else must become 'wildcard'"
          fi
          echo "=========================================="
          [ "$EXISTING" = "success" ] && [ "$EDGE" = "success" ]
