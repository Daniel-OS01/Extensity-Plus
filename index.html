<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Extensity-Plus</title>
<link rel="stylesheet" type="text/css" href="styles/normalize.css" />
<link rel="stylesheet" type="text/css" href="styles/font-awesome.min.css" />
<link rel="stylesheet" type="text/css" href="styles/index.css" />
<script type="text/javascript" src="js/libs/underscore-min.js"></script>
<script type="text/javascript" src="js/libs/underscore.string.min.js"></script>
<script type="text/javascript" src="js/libs/knockout-3.5.1.js"></script>
<script type="text/javascript" src="js/libs/knockout-secure-binding.min.js"></script>
<script type="text/javascript" src="js/storage.js"></script>
<script type="text/javascript" src="js/engine.js"></script>
<script type="text/javascript" src="js/index.js"></script>
</head>
<body class="list-view popup-bindings-pending">
<div id="popup-header-mount"></div>
<template id="popup-header-template">
  <section id="header" class="main">
    <h1>
      <a id="title" href="https://github.com/Daniel-OS01/Extensity-Plus" target="_blank" title="Open Extensity-Plus repository" aria-label="Open Extensity-Plus repository">
        <img src="images/icon48.png" width="16" height="16" alt="Extensity-Plus" />
      </a>
      <span class="active-profile-badge" data-sbind="visible: activeProfileObj, attr:{style: activeProfileBadgeStyle}">
        <i class="fa" data-sbind="attr:{class: activeProfileIconClass}"></i>
        <span data-sbind="text: activeProfileName"></span>
      </span>
      <a href="#" class="page" title="Undo" aria-label="Undo" data-sbind="click: switch.undo, css:{disabled: !canUndo()}"><i class="fa fa-undo" aria-hidden="true"></i></a>
      <a href="#" class="page" title="Toggle view" aria-label="Toggle view" data-sbind="click: toggleViewMode"><i class="fa" aria-hidden="true" data-sbind="css: viewToggleIcon"></i></a>
      <a href="#" class="page" title="Open dashboard" aria-label="Open dashboard" data-sbind="click: openDashboard"><i class="fa fa-table" aria-hidden="true"></i></a>
      <a href="options.html" class="page" target="_blank" title="Options" aria-label="Options"><i class="fa fa-cog" aria-hidden="true"></i></a>
      <a href="profiles.html" class="page" target="_blank" title="Profiles" aria-label="Profiles"><i class="fa fa-user-circle-o" aria-hidden="true"></i></a>
      <a href="chrome://extensions" class="page" target="_blank" title="Chrome extensions" aria-label="Chrome extensions" data-sbind="click: openChromeExtensions"><i class="fa fa-puzzle-piece" aria-hidden="true"></i></a>
      <a href="#" class="switch" title="Toggle all" aria-label="Toggle all" data-sbind="click: switch.flip"><i class="fa" aria-hidden="true" data-sbind="css: switch.toggleStyle"></i></a>
    </h1>
  </section>
</template>

<div id="popup-sort-toolbar-mount"></div>
<template id="popup-sort-toolbar-template">
  <section id="toolbar" class="main">
    <div class="sort-modes">
      <button type="button" title="Sort extensions alphabetically" data-sbind="click: setSortAlpha, css:{selected: opts.sortMode() == 'alpha'}">A-Z</button>
      <button type="button" title="Sort by usage frequency" data-sbind="click: setSortFrequency, css:{selected: opts.sortMode() == 'frequency'}">Popular</button>
      <button type="button" title="Sort by most recently installed" data-sbind="click: setSortRecent, css:{selected: opts.sortMode() == 'recent'}">Recent</button>
    </div>
    <p class="error" data-sbind="visible: error, text: error"></p>
  </section>
</template>

<template id="popup-sort-toolbar-error-template">
  <section id="toolbar-error" class="main">
    <p class="error" data-sbind="visible: error, text: error"></p>
  </section>
</template>

<section id="boot-loading" class="main">
  <p class="empty">Loading…</p>
</section>

<section id="search" class="main" data-sbind="if: opts.searchBox">
  <p><i class="fa fa-search"></i> <input type="text" data-sbind="value: search.q, valueUpdate: 'keyup'" tabindex="1" autofocus /></p>
</section>

<section id="content" class="main" style="display:none;" data-sbind="visible: !loading()">
  <section id="profiles" data-sbind="if: listedProfiles.any, visible: !search.q">
    <h1>Profiles</h1>
    <ul class="items" data-sbind="foreach: listedProfiles">
      <li class="app keyboard-row" tabindex="0" data-sbind="css: {active: isActive()}">
        <div class="profile-row" data-sbind="click: selectProfile, attr:{title: profileTooltip}">
          <i class="fa fa-check" data-sbind="visible: showPillCheck"></i>
          <i class="fa fa-lightbulb-o" data-sbind="visible: showAlwaysOnIcon"></i>
          <i class="fa fa-home" data-sbind="visible: showBaseIcon"></i>
          <i class="fa fa-star" data-sbind="visible: showFavoritesIcon"></i>
          <i class="fa profile-icon-display" data-sbind="visible: showCustomIcon, attr:{class: 'fa ' + icon()}"></i>
          <span data-sbind="visible: showPillText, text: popupLabel"></span>
          <span class="profile-count" title="Extensions in this profile" data-sbind="visible: showPillCount, text: itemCount"></span>
        </div>
      </li>
    </ul>
  </section>

  <section id="favorites-section" data-sbind="visible: listedFavorites.any">
    <h1>Favorites</h1>
    <ul class="items" data-sbind="template: {name: 'item-template', foreach: listedFavorites}"></ul>
  </section>

  <section data-sbind="if: opts.appsFirst() && opts.groupApps()">
    <h1 data-sbind="visible: listedApps.any">Apps</h1>
    <ul class="items" data-sbind="template: {name: 'item-template', foreach: listedApps}"></ul>
    <h1 data-sbind="visible: listedExtensions.any">Extensions</h1>
    <ul class="items" data-sbind="template: {name: 'item-template', foreach: listedExtensions}"></ul>
  </section>

  <section data-sbind="if: !opts.appsFirst() && opts.groupApps()">
    <h1 data-sbind="visible: listedExtensions.any">Extensions</h1>
    <ul class="items" data-sbind="template: {name: 'item-template', foreach: listedExtensions}"></ul>
    <h1 data-sbind="visible: listedApps.any">Apps</h1>
    <ul class="items" data-sbind="template: {name: 'item-template', foreach: listedApps}"></ul>
  </section>

  <section data-sbind="if: !opts.groupApps()">
    <h1 data-sbind="visible: listedFavoriteItems.any">Favorites</h1>
    <ul class="items" data-sbind="template: {name: 'item-template', foreach: listedFavoriteItems}"></ul>
    <h1 data-sbind="visible: listedNonFavoriteItems.any">Extensions &amp; Apps</h1>
    <ul class="items" data-sbind="template: {name: 'item-template', foreach: listedNonFavoriteItems}"></ul>
  </section>

  <section data-sbind="visible: emptyItems">
    <p class="empty"><i class="fa fa-exclamation-triangle"></i><br />No Extensions or Apps found.</p>
  </section>
</section>

<section id="loading-section" class="main" data-sbind="visible: loading">
  <p class="empty">Loading…</p>
</section>

<script type="text/html" id="item-template">
  <!-- ko if: showDefaultRow -->
  <li class="extension keyboard-row" tabindex="0" data-sbind="click: rowClick, event:{keydown: rowKeydown}, css:{disabled: disabled(), enabled: status}">
    <div class="item-main">
      <img class="extension-icon" data-sbind="attr:{src:icon}" />
      <div class="labels">
        <span class="name" data-sbind="text: short_name"></span>
        <span class="extension-subtitle" data-sbind="visible: showVersionCategoryLine, text: versionCategoryLine"></span>
        <div class="badges" data-sbind="visible: groupBadges().length">
          <!-- ko foreach: groupBadges -->
          <span class="badge group" title="Extension group badge" data-sbind="text: name"></span>
          <!-- /ko -->
        </div>
      </div>
    </div>
    <div class="item-actions">
      <!-- ko foreach: profileBadges -->
      <span class="badge profile-badge" data-sbind="text: name, css: colorClass, attr:{style: badgeStyle, title: title}"></span>
      <!-- /ko -->
      <i class="fa fa-flask" title="Development" data-sbind="visible: is_development()"></i>
      <button type="button" class="action-icon-button" title="Options" aria-label="Options" data-sbind="visible: showOptionsButton, click: launchOptionsAction, clickBubble: false"><i class="fa fa-gear" aria-hidden="true"></i></button>
    </div>
  </li>
  <!-- /ko -->
  <!-- ko if: showTableRow -->
  <li class="extension keyboard-row table-row" tabindex="0" data-sbind="event:{keydown: tableRowKeydown}, css:{disabled: disabled(), enabled: status, expanded: rowExpanded}">
    <div class="table-row-main">
      <img class="extension-icon" data-sbind="attr:{src:icon}" />
      <div class="table-row-labels">
        <div class="table-row-title">
          <span class="name" data-sbind="text: short_name, click: toggleCompactAction, clickBubble: false"></span>
          <span class="version-chip" data-sbind="visible: showVersionChip, text: version"></span>
          <span class="extension-subtitle" data-sbind="visible: showCategorySubtitle, text: category"></span>
          <i class="fa fa-flask" title="Development" data-sbind="visible: is_development()"></i>
        </div>
      </div>
      <div class="item-actions table-row-badges">
        <!-- ko foreach: profileBadges -->
        <span class="badge profile-badge" data-sbind="text: name, css: colorClass, attr:{style: badgeStyle, title: title}"></span>
        <!-- /ko -->
      </div>
      <button type="button" class="table-row-chevron" title="Show extension actions" aria-label="Show extension actions" data-sbind="click: toggleTableRowAction, clickBubble: false, css:{expanded: rowExpanded}">
        <i class="fa fa-chevron-left" aria-hidden="true"></i>
      </button>
    </div>
    <div class="table-action-line" data-sbind="visible: rowExpanded">
      <div class="action-controls-row">
        <div class="action-icon-row">
          <button type="button" class="action-icon-button" title="Toggle enable/disable" aria-label="Toggle enable/disable" data-sbind="click: toggleCompactAction, clickBubble: false">
            <i class="fa" data-sbind="css: toggleIconClass" aria-hidden="true"></i>
          </button>
          <button type="button" class="action-icon-button" title="Extension options" aria-label="Extension options" data-sbind="visible: optionsUrl(), click: launchOptionsAction, clickBubble: false"><i class="fa fa-cog" aria-hidden="true"></i></button>
          <button type="button" class="action-icon-button" title="Manage extension" aria-label="Manage extension" data-sbind="click: openManageAction, clickBubble: false"><i class="fa fa-puzzle-piece" aria-hidden="true"></i></button>
          <button type="button" class="action-icon-button" title="Web permissions" aria-label="Web permissions" data-sbind="click: openPermissionsAction, clickBubble: false"><i class="fa fa-shield" aria-hidden="true"></i></button>
          <button type="button" class="action-icon-button" title="Copy link" aria-label="Copy link" data-sbind="click: copyLinkAction, clickBubble: false, enable: copyLinkAvailable"><i class="fa fa-files-o" aria-hidden="true"></i></button>
          <button type="button" class="action-icon-button" title="Open in Chrome Web Store" aria-label="Open in Chrome Web Store" data-sbind="click: openStoreAction, clickBubble: false, enable: storeLinkAvailable()"><i class="fa fa-external-link" aria-hidden="true"></i></button>
          <button type="button" class="action-icon-button danger" title="Remove extension" aria-label="Remove extension" data-sbind="visible: canRemove, click: removeAction, clickBubble: false"><i class="fa fa-trash-o" aria-hidden="true"></i></button>
          <button type="button" class="action-icon-button" data-sbind="click: pinToToolbarAction, clickBubble: false, attr:{title: pinToToolbarTitle, 'aria-label': pinToToolbarTitle}">
            <i class="fa" aria-hidden="true" data-sbind="css: pinToToolbarIconClass"></i>
          </button>
        </div>
        <select class="profile-assign-select" title="Assign to profile" data-sbind="event:{change: onProfileMembershipChange}">
          <option value="">Profiles&#8230;</option>
          <!-- ko foreach: profileDropdownOptions -->
          <option data-sbind="value: value, text: label"></option>
          <!-- /ko -->
        </select>
      </div>
    </div>
  </li>
  <!-- /ko -->
  <!-- ko if: showCompactRow -->
  <li class="extension keyboard-row compact-row" tabindex="0" data-sbind="event:{keydown: compactRowKeydown}, css:{disabled: disabled(), enabled: status, expanded: rowExpanded}">
    <div class="compact-row-main">
      <img class="extension-icon" data-sbind="attr:{src:icon}" />
      <div class="compact-row-labels">
        <div class="compact-row-title">
          <span class="name" data-sbind="text: short_name, click: toggleCompactAction, clickBubble: false"></span>
          <span class="version-chip" data-sbind="visible: showVersionChip, text: version"></span>
          <i class="fa fa-flask" title="Development" data-sbind="visible: is_development()"></i>
        </div>
      </div>
      <div class="compact-row-side">
        <div class="item-actions compact-row-badges">
          <!-- ko foreach: profileBadges -->
          <span class="badge profile-badge" data-sbind="text: name, css: colorClass, attr:{style: badgeStyle, title: title}"></span>
          <!-- /ko -->
        </div>
        <button type="button" class="compact-row-chevron" title="Show extension actions" aria-label="Show extension actions" data-sbind="click: toggleCompactRowAction, clickBubble: false, css:{expanded: rowExpanded}">
          <i class="fa fa-chevron-down" aria-hidden="true"></i>
        </button>
      </div>
    </div>
    <div class="compact-action-line" data-sbind="visible: rowExpanded">
      <div class="action-controls-row">
        <div class="action-icon-row">
          <button type="button" class="action-icon-button" title="Toggle enable/disable" aria-label="Toggle enable/disable" data-sbind="click: toggleCompactAction, clickBubble: false">
            <i class="fa" data-sbind="css: toggleIconClass" aria-hidden="true"></i>
          </button>
          <button type="button" class="action-icon-button" title="Extension options" aria-label="Extension options" data-sbind="visible: optionsUrl(), click: launchOptionsAction, clickBubble: false"><i class="fa fa-cog" aria-hidden="true"></i></button>
          <button type="button" class="action-icon-button" title="Manage extension" aria-label="Manage extension" data-sbind="click: openManageAction, clickBubble: false"><i class="fa fa-puzzle-piece" aria-hidden="true"></i></button>
          <button type="button" class="action-icon-button" title="Web permissions" aria-label="Web permissions" data-sbind="click: openPermissionsAction, clickBubble: false"><i class="fa fa-shield" aria-hidden="true"></i></button>
          <button type="button" class="action-icon-button" title="Copy link" aria-label="Copy link" data-sbind="click: copyLinkAction, clickBubble: false, enable: copyLinkAvailable"><i class="fa fa-files-o" aria-hidden="true"></i></button>
          <button type="button" class="action-icon-button" title="Open in Chrome Web Store" aria-label="Open in Chrome Web Store" data-sbind="click: openStoreAction, clickBubble: false, enable: storeLinkAvailable()"><i class="fa fa-external-link" aria-hidden="true"></i></button>
          <button type="button" class="action-icon-button danger" title="Remove extension" aria-label="Remove extension" data-sbind="visible: canRemove, click: removeAction, clickBubble: false"><i class="fa fa-trash-o" aria-hidden="true"></i></button>
          <button type="button" class="action-icon-button" data-sbind="click: pinToToolbarAction, clickBubble: false, attr:{title: pinToToolbarTitle, 'aria-label': pinToToolbarTitle}">
            <i class="fa" aria-hidden="true" data-sbind="css: pinToToolbarIconClass"></i>
          </button>
        </div>
        <select class="profile-assign-select" title="Assign to profile" data-sbind="event:{change: onProfileMembershipChange}">
          <option value="">Profiles&#8230;</option>
          <!-- ko foreach: profileDropdownOptions -->
          <option data-sbind="value: value, text: label"></option>
          <!-- /ko -->
        </select>
      </div>
    </div>
  </li>
  <!-- /ko -->
  <!-- ko if: showAppRow -->
  <li class="app keyboard-row" tabindex="0" data-sbind="click: rowClick, event:{keydown: rowKeydown}">
    <div class="item-main">
      <img class="extension-icon" data-sbind="attr:{src:icon}" />
      <div class="labels">
        <span class="name" data-sbind="text: short_name"></span>
      </div>
    </div>
    <div class="item-actions">
      <i class="fa fa-flask" title="Development" data-sbind="visible: is_development()"></i>
      <button type="button" class="action-icon-button" title="Options" aria-label="Options" data-sbind="visible: showOptionsButton, click: launchOptionsAction, clickBubble: false"><i class="fa fa-gear" aria-hidden="true"></i></button>
    </div>
  </li>
  <!-- /ko -->
</script>
</body>
</html>
