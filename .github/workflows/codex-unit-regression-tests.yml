name: PR Unit Regression Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  unit-regression:
    name: Run repository unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Execute Node test suite
        run: npm test

      - name: PR safety summary (pass)
        if: success()
        run: |
          {
            echo "## Safe-to-commit summary"
            echo "✅ This pull request is safe to commit from a unit-regression perspective."
            echo "All repository unit tests passed, including functional and edge-case suites under tests/*.test.js."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: PR safety summary (fail with diagnostics)
        if: failure()
        run: |
          {
            echo "## Safe-to-commit summary"
            echo "❌ This pull request is **not** safe to commit yet."
            echo "One or more unit-regression tests failed."
            echo ""
            echo "### Diagnostic feedback for AI coding assistants"
            echo "1. Re-run \\`npm test\\` locally to reproduce the exact failing test names."
            echo "2. Inspect recent changes in JS modules touched by the PR and align behavior with existing tests in \\`tests/*.test.js\\`."
            echo "3. If behavior changed intentionally, update or add targeted tests first, then fix implementation."
            echo "4. Verify no brittle assumptions were introduced (undefined fields, URL parsing edge cases, storage migration regressions)."
          } >> "$GITHUB_STEP_SUMMARY"
